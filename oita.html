    body {

    .header {

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .logo-container a {

    }

    .logo {

    }

    .footer {

    }

    .footer-info {

      align-items: center;
      gap: 24px;
      padding: 0px 32px;
    }

    .footer-info a {

      text-align: center;
      font-size: 14px;
      font-style: normal;
      font-weight: 700;

      letter-spacing: 0.16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;

    .banner {

      background-position: center;

      justify-content: center;
      align-items: center;
      position: relative;
    }

    .banner-link {
      margin: 8px 32px;
      position: absolute;
      top: 0;
      left: 0;
    }

    .area-link {
      color: white;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.16px;
      margin-right: 1rem;
    }

    .banner-link span {
      color: white;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.16px;
      margin-right: 1rem;
    }

    .child-link {
      text-decoration: none;
      color: var(--white-white-100, #FFF);
      font-size: 16px;
      font-style: normal;
      font-weight: 500;
      line-height: 160%;
      letter-spacing: 0.16px;
    }

    .banner-title {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .banner-title-main {
      color: #FFF;
      text-align: center;
      font-size: 40px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.8px;
      padding-bottom: 2px;
      box-shadow: rgba(242, 195, 28, 0.6) 0px -15px 0px 0px inset;
    }

    .banner-title-sub {
      color: var(--white-white-100, #FFF);
      text-align: center;
      font-size: 24px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.48px;
    }

      font-size: 13.295px ;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.48px;
      margin-top: 16px;

      min-height: 54vh;
    }

      margin-top: 64px;
    }

      display: flex;

      width: 24px;
      height: 24px;

      margin: 16px;

      overflow-y: auto;

      min-height: 100px;

      margin-left: 16px;
      margin-bottom: 8px;

      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      min-height: 50px;
    }

    .sub-card-item {
      border-radius: 8px;
      width: calc(33.33% - 8px);
      border: 1px solid var(--Grayscale-Gray-05, #F2F2F3);
      background: var(--white-white-100, #FFF);

      font-style: normal;
      font-weight: 700;

      text-decoration: none;

      height: 24px;
    }

      justify-content: center;

      text-align: center;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 20px;
      letter-spacing: 0.16px;
      gap: 8px;
    }

    .area-redirect img {
      width: 20px;
      height: 20px;
    }

      background-color: #ffeeba;
      transition: background-color 0.5s ease;
    }

      justify-content: center;
      font-size: 20px;
      font-style: normal;
      font-weight: 700;
      line-height: 20px;
      padding-left: 12px;
      letter-spacing: 0.16px;
      margin-top: 48px;
      gap: 8px;
    }

    @media only screen and (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: center;
      }

      .image-holder img {
        flex: 0 0 100%;
        max-width: 100%;
      }

      .footer {
        flex-direction: column;
        align-items: center;

      }

      .footer-info {
        display: flex;
        flex-direction: column;

        gap: 8px;

        align-items: center;

        width: 100%;
      }

      }

        width: 100%;

    const createSubCardItems = (address1, address2, subCardListItems) => {
      return `
        <div class="sub-card-title" id='target_${address1}_${address2}'>
          ${address2 !== 'null' && address2 !== '-' ? address2 : ''}
        </div>
        <div class="sub-card-list">
          ${subCardListItems}
        </div>`
    }

    const onClick = (path) => {
      window.location.href = path;
    }

    const createSubCardListItems = (listDatas) => {
      let rs = '';
      for (let i = 0; i < listDatas.length; i += 1) {
        if(prefecture !== 'オンライン教室') {
          if(listDatas[i].access) {
            rs += `
            <a class="sub-card-item" onClick="onClick('./${listDatas[i].individualPage || listDatas[i].id}.html')">
              <div class="school-name">${listDatas[i].schoolName || ""} ${listDatas[i].className || ""}</div>
              <div class="school-address">
                <img src="images/ic-map.png" />
                <div>${listDatas[i].prefecture} ${(listDatas[i].address1 === '23区' || !listDatas[i].address1) ? '' : listDatas[i].address1} ${listDatas[i].address2 || ''} ${listDatas[i].addressAfter || ''} ${listDatas[i].addressDetail || ''}</div>
              </div>
              <div class="school-access">
                <img src="images/ic-car.png" />
                <div>${listDatas[i].access}</div>
              </div>
            </a>`
          }
          else {
            rs += `
            <a class="sub-card-item" onClick="onClick('./${listDatas[i].individualPage || listDatas[i].id}.html')">
              <div class="school-name">${listDatas[i].schoolName || ""} ${listDatas[i].className || ""}</div>
              <div class="school-address">
                <img src="images/ic-map.png" />
                <div>${listDatas[i].prefecture} ${(listDatas[i].address1 === '23区' || !listDatas[i].address1) ? '' : listDatas[i].address1} ${listDatas[i].address2 || ''} ${listDatas[i].addressAfter || ''} ${listDatas[i].addressDetail || ''}</div>
              </div>
            </a>`
          }
        }
        else {
          rs += `
          <a class="sub-card-item" onClick="onClick('./${listDatas[i].individualPage || listDatas[i].id}.html')">
            <div class="school-name">${listDatas[i].schoolName || ""} ${listDatas[i].className || ""}</div>
          </a>`
        }
      }
      return rs;
    }

    let areaInnerHTML = '';

    for (const [key, value] of Object.entries(schoolDataMapping)) {
      let subCard = "";
      let hasSchoolData = false;
      for (const [key2, value2] of Object.entries(value)) {
        if (value2.length) {
          hasSchoolData = true;
          subCard += createSubCardItems(
            key,
            key2,
            createSubCardListItems(value2)
          );
        }
      }
      if (hasSchoolData) {
        const areaCard = createAreaCardItem(key);
        areaInnerHTML += areaCard;
        const collapse = createCollapseItem(key, subCard);
        areaInnerHTML += collapse;
      }

      index++;
    }

    accordion.innerHTML = areaInnerHTML;

    const dropdownItems = document.querySelectorAll('.dropdown-item');

    dropdownItems.forEach(function (item) {
      item.addEventListener('click', function (event) {
        const attr = this.getAttribute('href').substring(1).split('_');
        const address1 = attr[1];
        const address2 = attr[2];
        const areaCardId = `area_${address1}_null`;
        const collapseId = `collapse_${address1}_null`;
        const targetId = `target_${address1}_${address2}`;
        const areaCard = document.getElementById(areaCardId);
        const collapseElement = document.getElementById(collapseId);
        const targetElement = document.getElementById(targetId);
        if (collapseElement) {
          if (!collapseElement.classList.contains('show')) {
            const bsCollapse = new bootstrap.Collapse(collapseElement);
            bsCollapse.show();
          }
          setTimeout(() => {
            if (targetElement && !targetId.includes('null')) {
              targetElement.classList.add('highlight');
              targetElement.scrollIntoView({
                behavior: 'smooth',
                block: 'start',
              })

              setTimeout(() => {
                targetElement.classList.remove('highlight');
              }, 1500);
            }
            else {
              areaCard.classList.add('highlight');

              areaCard.scrollIntoView({
                behavior: 'smooth',
                block: 'start',
              })

              setTimeout(() => {
                areaCard.classList.remove('highlight');
              }, 1500);
            }
          }, 400);
        }
      });
    });
  </script>
</body>

</html>
