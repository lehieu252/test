    body {

      font-family: "Noto Sans JP";
    }

    .header {

      align-items: start;
      gap: 76px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .logo-container a {
      display: block;
      padding: 21px 16px;
    }

    .logo {

      height: auto;
    }

    .footer {
      width: 100%;
      display: flex;
      justify-content: space-between;
    }

    .footer-info {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0px 32px;
    }

    .footer-info a {
      color: var(--text_color, #323232);
      text-align: center;
      font-size: 14px;
      font-style: normal;
      font-weight: 700;
      line-height: 16px;
      letter-spacing: 0.16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .banner {
      display: flex;
      background-image: url('images/bg_2.png');
      background-position: center;
      min-height: 235px;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .banner-link {
      margin: 8px 32px;
      position: absolute;
      top: 0;
      left: 0;
    }

    .area-link {
      color: white;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.16px;
      margin-right: 1rem;
    }

    .banner-link span {
      color: white;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.16px;
      margin-right: 1rem;
    }

    .child-link {
      text-decoration: none;
      color: var(--white-white-100, #FFF);
      font-size: 16px;
      font-style: normal;
      font-weight: 500;
      line-height: 160%;
      letter-spacing: 0.16px;
    }

    .banner-title {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .banner-title-main {
      color: #FFF;
      text-align: center;
      font-size: 40px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.8px;
      padding-bottom: 2px;
      box-shadow: rgba(242, 195, 28, 0.6) 0px -15px 0px 0px inset;
    }

    .banner-title-sub {
      color: var(--white-white-100, #FFF);
      text-align: center;
      font-size: 24px;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.48px;
    }

    .banner-title-sub-2{

      font-size: 13.295px ;
      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.48px;
      margin-top: 16px;

      min-height: 54vh;
    }
    .filter-dropdown {
      margin-top: 64px;
    }

      display: flex;
      padding: 12px;
      width: 280px;
      justify-content: space-between;

      background: var(--white-white-100, #FFF);

    .dropdown-btn img {
      width: 24px;
      height: 24px;
    }

    .dropdown-menu {
      width: 280px;
      margin: 16px;
      max-height: 300px;
      overflow-y: auto;
    }

      background: var(--Grayscale-Gray-05, #F2F2F3);
      padding: 16px;
      min-height: 100px;
    }

      font-style: normal;
      font-weight: 700;
      line-height: 160%;
      letter-spacing: 0.32px;
      margin-left: 16px;
      margin-bottom: 8px;

      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      min-height: 50px;
    }

    .sub-card-item {
      border-radius: 8px;
      width: calc(33.33% - 8px);
      border: 1px solid var(--Grayscale-Gray-05, #F2F2F3);
      background: var(--white-white-100, #FFF);
      box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.08);

      text-decoration: none;
      cursor: pointer;

      font-style: normal;
      font-weight: 700;

      font-weight: 400;
      line-height: normal;

      font-style: normal;
      font-weight: 700;

      height: 24px;

      align-items: center;
      justify-content: center;

      text-align: center;
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
      line-height: 20px;
      letter-spacing: 0.16px;
      gap: 8px;
    }

    .area-redirect img {
      width: 20px;
      height: 20px;
    }

    .highlight {
      background-color: #ffeeba;
      transition: background-color 0.5s ease;
    }

      display: flex;
      justify-content: center;
      font-size: 20px;
      font-style: normal;
      font-weight: 700;
      line-height: 20px;
      padding-left: 12px;
      letter-spacing: 0.16px;
      margin-top: 48px;
      gap: 8px;
    }

    @media only screen and (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: center;
      }

      .image-holder img {
        flex: 0 0 100%;
        max-width: 100%;
      }

      .footer {
        flex-direction: column;
        align-items: center;

      }

      .footer-info {
        display: flex;
        flex-direction: column;
        margin-bottom: 64px;
      }

      .area-redirect a {

        padding: 16px;

        gap: 8px;

        box-shadow: 0px 4px 24px 0px rgba(0, 0, 0, 0.05);

      .area-link,

        font-size: 12px;
        white-space: nowrap;
        text-overflow: ellipsis;

        align-items: center;

      }

      .dropdown-btn {
        width: 100%;
      }

      }

        width: 100%;
